#
# DKMS configuration for the inet8 IPv8 kernel module.
#
# Install with:
#   sudo dkms add .
#   sudo dkms build inet8/0.1.0
#   sudo dkms install inet8/0.1.0
#
# Requirements:
#   - Linux kernel >= 6.11 built with CONFIG_RUST=y
#   - Rust toolchain >= 1.85.0 (see rust-toolchain.toml)
#   - Kernel build directory with Rust metadata
#     (typically /lib/modules/<version>/build)

PACKAGE_NAME="inet8"
PACKAGE_VERSION="0.1.0"

BUILT_MODULE_NAME[0]="inet8"
BUILT_MODULE_LOCATION[0]="."

DEST_MODULE_LOCATION[0]="/updates/dkms"

MAKE[0]="make KDIR=/lib/modules/${kernelver}/build"
CLEAN="make KDIR=/lib/modules/${kernelver}/build clean"

AUTOINSTALL="yes"
